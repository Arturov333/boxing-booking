<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тижневий протокол</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ════════════════════════════════════════════════════════════ -->
<!--  ДАНІ ТИЖНЯ — ЗМІНЮЙ ТІЛЬКИ ЦЕЙ БЛОК. Дизайн чіпати не треба.  -->
<!--  rest:true → сірий день відпочинку. note:"" → без примітки.    -->
<!-- ════════════════════════════════════════════════════════════ -->
<script>
const DATA = {
  week: "1",
  client: "Ім'я клієнта",
  days: [
    {
      tag: "ПН", title: "Назва дня",
      blocks: [
        { label: "Блок · час", items: ["Вправа 1", "Вправа 2", "Вправа 3"] },
        { label: "Ще блок", items: ["Вправа"] }
      ],
      note: "Примітка дня (або лиши пустим)."
    },
    { tag: "ВТ", title: "", blocks: [{ label: "", items: [""] }], note: "" },
    { tag: "СР", title: "", blocks: [{ label: "", items: [""] }], note: "" },
    { tag: "ЧТ", title: "", blocks: [{ label: "", items: [""] }], note: "" },
    { tag: "ПТ", title: "", blocks: [{ label: "", items: [""] }], note: "" },
    { tag: "СБ", title: "Відпочинок", rest: true, blocks: [{ label: "", items: [""] }], note: "" },
    { tag: "НД", title: "Відпочинок", rest: true, blocks: [{ label: "", items: [""] }], note: "" }
  ]
};
</script>
<!-- ════════════ КІНЕЦЬ ДАНИХ. Нижче — дизайн. ════════════ -->

<style>
  :root{
    --bg:#070707;
    --plat:#E5E4E2;
    --plat-dim:#9a9a98;
    --line:rgba(229,228,226,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--plat);
    font-family:'Barlow Condensed',sans-serif;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px; margin:0 auto; padding:48px 20px 70px;}

  header{margin-bottom:40px; border-bottom:1px solid var(--line); padding-bottom:26px;}
  .eyebrow{
    font-size:13px; letter-spacing:5px; text-transform:uppercase;
    color:var(--plat-dim); font-weight:500; margin-bottom:10px;
  }
  h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(44px,15vw,72px);
    line-height:0.9; letter-spacing:1px; font-weight:400;
  }
  h1 small{display:block; font-size:0.42em; letter-spacing:3px; color:var(--plat-dim); margin-top:8px;}

  .day{border-bottom:1px solid var(--line); padding:22px 0;}
  .day-head{display:flex; align-items:baseline; gap:14px;}
  .tag{
    font-family:'Bebas Neue',sans-serif;
    font-size:24px; letter-spacing:1px;
    border:1px solid var(--plat); border-radius:3px;
    padding:2px 11px; min-width:54px; text-align:center; flex-shrink:0;
  }
  .tag.rest{border-color:#3a3a3a; color:var(--plat-dim);}
  .day-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:27px; letter-spacing:0.5px; line-height:1;
  }
  .day-body{padding-left:68px; margin-top:16px;}
  @media(max-width:420px){ .day-body{padding-left:0;} }

  .block-label{
    font-size:13px; letter-spacing:2px; text-transform:uppercase;
    color:var(--plat-dim); font-weight:600; margin:14px 0 5px;
  }
  .block-label:first-child{margin-top:0;}
  ul{list-style:none;}
  li{
    font-size:17px; font-weight:300; color:#d8d7d4; line-height:1.55;
    padding-left:16px; position:relative;
  }
  li::before{content:"—"; position:absolute; left:0; color:#555;}

  .note{
    margin-top:14px; font-size:15px; font-weight:300; color:var(--plat-dim);
    border-left:2px solid var(--plat); padding:7px 0 7px 14px;
  }

  footer{margin-top:46px; text-align:center; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; color:#555;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Тижневий протокол</div>
    <h1 id="title"></h1>
  </header>
  <div id="days"></div>
  <footer>Artur Performance Club</footer>
</div>

<script>
  document.getElementById('title').innerHTML =
    `Тиждень ${DATA.week}<small>${DATA.client}</small>`;

  const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  document.getElementById('days').innerHTML = DATA.days.map(d => `
    <div class="day">
      <div class="day-head">
        <span class="tag${d.rest ? ' rest':''}">${esc(d.tag)}</span>
        <span class="day-title">${esc(d.title)}</span>
      </div>
      <div class="day-body">
        ${(d.blocks||[]).map(b => `
          <div class="block-label">${esc(b.label)}</div>
          <ul>${b.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
        `).join('')}
        ${d.note ? `<div class="note">${esc(d.note)}</div>` : ''}
      </div>
    </div>`).join('');
</script>
</body>
</html>
